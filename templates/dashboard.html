<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridShield - Power Grid Cybersecurity</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #0f1428 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        
        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(26, 31, 58, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.1);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo-icon {
            width: 50px;
            height: 50px;
            animation: rotate 30s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
            font-weight: 600;
        }
        .indicator {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        .indicator.online {
            background: #00ff88;
            box-shadow: 0 0 20px #00ff88;
        }
        .indicator.offline {
            background: #666;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.95); }
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: rgba(26, 31, 58, 0.6);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(0, 212, 255, 0.15);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }
        .stat-card:hover::before {
            left: 100%;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.3);
        }
        .stat-label {
            color: #a0aec0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }
        .stat-value {
            font-size: 2.8rem;
            font-weight: 700;
            line-height: 1;
        }
        .value-green {
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }
        .value-yellow {
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }
        .value-red {
            color: #ff4444;
            text-shadow: 0 0 20px rgba(255, 68, 68, 0.4);
        }
        
        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }
        .card {
            background: rgba(26, 31, 58, 0.6);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(0, 212, 255, 0.15);
        }
        .card h2 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Chart */
        .chart-container {
            position: relative;
            height: 320px;
            background: linear-gradient(180deg, rgba(20, 25, 40, 0.6) 0%, rgba(10, 10, 15, 0.7) 100%);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }
        
        /* Grid Status */
        .metric {
            margin-bottom: 25px;
        }
        .metric:last-child {
            margin-bottom: 0;
        }
        .metric-label {
            display: block;
            color: #888;
            margin-bottom: 10px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .metric-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }
        .mode-badge {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.1rem;
            animation: glow 2s ease-in-out infinite alternate;
        }
        .mode-normal {
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            color: #0a0e1a;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
        }
        .mode-shadow {
            background: linear-gradient(135deg, #ff4444, #ff6b6b);
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.4);
        }
        @keyframes glow {
            from { box-shadow: 0 0 20px currentColor; }
            to { box-shadow: 0 0 40px currentColor; }
        }
        
        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .btn-start {
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            color: #0a0e1a;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }
        .btn-start:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
        }
        .btn-stop {
            background: linear-gradient(135deg, #ff4444, #ff6b6b);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.4);
        }
        .btn-stop:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.6);
        }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Events Log */
        .events {
            max-height: 450px;
            overflow-y: auto;
            background: rgba(10, 10, 15, 0.5);
            border-radius: 10px;
            padding: 15px;
        }
        .event-item {
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(26, 31, 58, 0.5);
            border-left: 4px solid;
            border-radius: 6px;
            font-size: 0.9rem;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .event-info { border-left-color: #00d4ff; }
        .event-warning { border-left-color: #ffd700; }
        .event-critical {
            border-left-color: #ff4444;
            background: rgba(255, 68, 68, 0.08);
        }
        .event-time {
            color: #666;
            font-size: 0.75rem;
            margin-bottom: 5px;
        }
        .event-severity {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-right: 8px;
        }
        .severity-info {
            background: #00d4ff;
            color: #0a0e1a;
        }
        .severity-warning {
            background: #ffd700;
            color: #0a0e1a;
        }
        .severity-critical {
            background: #ff4444;
            color: #fff;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(26, 31, 58, 0.5);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #00d4ff, #00ff88);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #00ff88, #00d4ff);
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">
                <svg viewBox="0 0 100 100" class="logo-icon">
                    <path d="M50 5 L90 25 L90 75 L50 95 L10 75 L10 25 Z" fill="none" stroke="#00d4ff" stroke-width="3"/>
                    <path d="M50 20 L70 30 L70 70 L50 80 L30 70 L30 30 Z" fill="#00d4ff" opacity="0.3"/>
                </svg>
                <h1>⚡ GridShield</h1>
            </div>
            <div class="status">
                <span id="statusIndicator" class="indicator offline"></span>
                <span id="statusText">OFFLINE</span>
            </div>
        </header>

        <!-- Statistics Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Packets Captured</div>
                <div class="stat-value value-green" id="packetsCaptured">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Commands Allowed</div>
                <div class="stat-value value-green" id="commandsAllowed">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Violations Detected</div>
                <div class="stat-value value-yellow" id="violationsDetected">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Commands Blocked</div>
                <div class="stat-value value-red" id="commandsBlocked">0</div>
            </div>
        </div>

        <!-- Main Content Grid -->
        <div class="main-grid">
            <!-- Left Column - Chart & Events -->
            <div>
                <!-- Real-Time Traffic Chart -->
                <div class="card" style="margin-bottom: 25px;">
                    <h2>📈 Real-Time Traffic Analysis</h2>
                    <div class="chart-container">
                        <canvas id="trafficChart"></canvas>
                    </div>
                </div>

                <!-- Live Events Log -->
                <div class="card">
                    <h2>📋 Live Security Events</h2>
                    <div class="events" id="eventsLog">
                        <div style="text-align: center; color: #666; padding: 50px;">
                            <div style="font-size: 3rem; margin-bottom: 15px;">🔍</div>
                            <div>No events yet.<br>Click "Start System" to begin monitoring.</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column - Status & Controls -->
            <div>
                <!-- Grid Status -->
                <div class="card" style="margin-bottom: 25px;">
                    <h2>🔌 Grid Status</h2>
                    <div class="metric">
                        <span class="metric-label">Grid Frequency</span>
                        <div class="metric-value" id="gridFrequency">60.00 Hz</div>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Operational Mode</span>
                        <div>
                            <span id="operationalMode" class="mode-badge mode-normal">NORMAL</span>
                        </div>
                    </div>
                </div>

                <!-- Control Panel -->
                <div class="card">
                    <h2>🎮 Control Panel</h2>
                    <div class="controls">
                        <button id="startBtn" class="btn-start" onclick="startSystem()">
                            ▶ Start System
                        </button>
                        <button id="stopBtn" class="btn-stop" onclick="stopSystem()" disabled>
                            ⏹ Stop
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Socket.IO connection
        const socket = io();
        
        // Enhanced Chart.js configuration for real-time data
        const ctx = document.getElementById('trafficChart').getContext('2d');
        const trafficChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Allowed Commands',
                    data: [],
                    borderColor: '#00ff88',
                    backgroundColor: (context) => {
                        const gradient = context.chart.ctx.createLinearGradient(0, 0, 0, 300);
                        gradient.addColorStop(0, 'rgba(0, 255, 136, 0.4)');
                        gradient.addColorStop(1, 'rgba(0, 255, 136, 0.02)');
                        return gradient;
                    },
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true,
                    pointRadius: 0,
                    pointHoverRadius: 6,
                    borderCapStyle: 'round',
                    borderJoinStyle: 'round'
                }, {
                    label: 'Blocked Commands',
                    data: [],
                    borderColor: '#ff4444',
                    backgroundColor: (context) => {
                        const gradient = context.chart.ctx.createLinearGradient(0, 0, 0, 300);
                        gradient.addColorStop(0, 'rgba(255, 68, 68, 0.4)');
                        gradient.addColorStop(1, 'rgba(255, 68, 68, 0.02)');
                        return gradient;
                    },
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true,
                    pointRadius: 0,
                    pointHoverRadius: 6,
                    borderCapStyle: 'round',
                    borderJoinStyle: 'round'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { 
                    duration: 0,
                    easing: 'easeOutQuart'
                },
                interaction: {
                    mode: 'index',
                    intersect: false
                },
                scales: {
                    x: { 
                        grid: { 
                            color: 'rgba(0, 212, 255, 0.08)',
                            drawBorder: false
                        },
                        ticks: {
                            color: '#888',
                            maxTicksLimit: 10,
                            maxRotation: 0,
                            font: { size: 10 }
                        }
                    },
                    y: { 
                        beginAtZero: true,
                        suggestedMax: 10,
                        grid: { 
                            color: 'rgba(0, 212, 255, 0.08)',
                            drawBorder: false
                        },
                        ticks: {
                            color: '#888',
                            precision: 0,
                            font: { size: 10 }
                        }
                    }
                },
                plugins: {
                    legend: { 
                        display: true,
                        position: 'top',
                        labels: { 
                            color: '#fff',
                            usePointStyle: true,
                            padding: 20,
                            font: {
                                size: 12,
                                weight: '600'
                            },
                            generateLabels: function(chart) {
                                const labels = Chart.defaults.plugins.legend.labels.generateLabels(chart);
                                labels.forEach(label => {
                                    label.pointStyle = 'circle';
                                    label.padding = 20;
                                });
                                return labels;
                            }
                        }
                    },
                    tooltip: {
                        enabled: true,
                        backgroundColor: 'rgba(10, 14, 26, 0.95)',
                        titleColor: '#00d4ff',
                        bodyColor: '#fff',
                        borderColor: 'rgba(0, 212, 255, 0.3)',
                        borderWidth: 1,
                        padding: 12,
                        displayColors: true,
                        cornerRadius: 8,
                        caretPadding: 10,
                        callbacks: {
                            title: function(items) {
                                return 'Time: ' + items[0].label;
                            },
                            label: function(context) {
                                return context.dataset.label + ': ' + context.parsed.y;
                            }
                        }
                    }
                }
            }
        });

        // Socket event handlers
        socket.on('connect', () => {
            console.log('Connected to GridShield server');
            updateStatus(true);
        });

        socket.on('disconnect', () => {
            console.log('Disconnected from server');
            updateStatus(false);
        });

        socket.on('initial_data', (data) => {
            updateStats(data.stats);
            loadEvents(data.events);
            if (data.traffic) {
                trafficChart.data.labels = data.traffic.labels;
                trafficChart.data.datasets[0].data = data.traffic.allowed;
                trafficChart.data.datasets[1].data = data.traffic.blocked;
                trafficChart.update();
            }
        });

        socket.on('stats_update', (stats) => {
            updateStats(stats);
            
            // Update chart with smooth transition
            if (trafficChart.data.labels.length > 0) {
                trafficChart.update('none'); // No animation for performance
            }
        });

        socket.on('new_event', (event) => {
            addEventToLog(event);
            updateChart(event);
        });

        socket.on('system_started', () => {
            updateStatus(true);
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
        });

        socket.on('system_stopped', () => {
            updateStatus(false);
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        });

        function updateStatus(online) {
            const indicator = document.getElementById('statusIndicator');
            const text = document.getElementById('statusText');
            
            if (online) {
                indicator.className = 'status-indicator online';
                text.textContent = 'ONLINE';
            } else {
                indicator.className = 'status-indicator offline';
                text.textContent = 'OFFLINE';
            }
        }

        function updateStats(stats) {
            // Update with animation effect
            const packetsEl = document.getElementById('packetsCaptured');
            const allowedEl = document.getElementById('commandsAllowed');
            const violationsEl = document.getElementById('violationsDetected');
            const blockedEl = document.getElementById('commandsBlocked');
            
            // Animate value changes
            if (stats.packets_captured !== parseInt(packetsEl.textContent)) {
                packetsEl.style.transform = 'scale(1.1)';
                setTimeout(() => packetsEl.style.transform = 'scale(1)', 150);
            }
            packetsEl.textContent = stats.packets_captured || 0;
            
            if (stats.commands_allowed !== parseInt(allowedEl.textContent)) {
                allowedEl.style.transform = 'scale(1.1)';
                setTimeout(() => allowedEl.style.transform = 'scale(1)', 150);
            }
            allowedEl.textContent = stats.commands_allowed || 0;
            
            if (stats.violations_detected !== parseInt(violationsEl.textContent)) {
                violationsEl.style.transform = 'scale(1.1)';
                setTimeout(() => violationsEl.style.transform = 'scale(1)', 150);
            }
            violationsEl.textContent = stats.violations_detected || 0;
            
            if (stats.commands_blocked !== parseInt(blockedEl.textContent)) {
                blockedEl.style.transform = 'scale(1.1)';
                setTimeout(() => blockedEl.style.transform = 'scale(1)', 150);
            }
            blockedEl.textContent = stats.commands_blocked || 0;
            
            if (stats.grid_frequency) {
                document.getElementById('gridFrequency').textContent = stats.grid_frequency.toFixed(2) + ' Hz';
            }
            
            if (stats.mode) {
                const modeEl = document.getElementById('operationalMode');
                modeEl.textContent = stats.mode;
                modeEl.className = `mode-badge ${stats.mode === 'SHADOW' ? 'mode-shadow' : 'mode-normal'}`;
            }
        }

        function loadEvents(events) {
            const log = document.getElementById('eventsLog');
            log.innerHTML = '';
            events.forEach(event => addEventToLog(event));
        }

        function addEventToLog(event) {
            const log = document.getElementById('eventsLog');
            const placeholder = log.querySelector('div[style*="text-align: center"]');
            if (placeholder) placeholder.remove();
            
            const eventEl = document.createElement('div');
            const severityClass = event.severity.toLowerCase() === 'info' ? 'event-info' : 
                                 event.severity.toLowerCase() === 'critical' ? 'event-critical' : 'event-warning';
            eventEl.className = `event-item ${severityClass}`;
            eventEl.innerHTML = `
                <div class="event-time">${new Date(event.timestamp).toLocaleTimeString()}</div>
                <div class="event-content">
                    <span class="event-severity severity-${event.severity.toLowerCase()}">${event.severity}</span>
                    <span>${event.message}</span>
                </div>
            `;
            
            log.insertBefore(eventEl, log.firstChild);
            
            // Keep only last 50 events
            while (log.children.length > 50) {
                log.removeChild(log.lastChild);
            }
        }

        async function startSystem() {
            try {
                const response = await fetch('/api/start', { method: 'POST' });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                console.log('System started:', data.message);
            } catch (error) {
                console.error('Failed to start system:', error);
                alert('Failed to start system: ' + error.message);
            }
        }

        async function stopSystem() {
            try {
                const response = await fetch('/api/stop', { method: 'POST' });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                console.log('System stopped:', data.message);
            } catch (error) {
                console.error('Failed to stop system:', error);
                alert('Failed to stop system: ' + error.message);
            }
        }
    </script>
</body>
</html>
